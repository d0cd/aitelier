# Example brig cell for aitelier + Sandbox Agent.
#
# Run with: brig cell run --file docs/deploy/aitelier.cell.yaml -d
# Attach:   brig cell shell aitelier
# Logs:     brig cell logs aitelier -f
# Network:  brig cell network aitelier
#
# Architecture:
#   - aitelier service + Sandbox Agent both run inside this cell.
#   - SA's `mode = "host"` (within the cell — the cell IS the sandbox).
#   - Postgres + LiteLLM live elsewhere; reachable via `*.host.brig`
#     virtual routing (configure on the brig daemon, not here).
#   - Outbound network is allowlisted via Warden (`policy.allow`).
#
# CONFIG INJECTION:
# Aitelier reads zero env vars by design — all config is TOML. Mount an
# `aitelier.toml` at /app/aitelier.toml (or /root/.config/aitelier/config.toml)
# via brig's secret/file-mount mechanism. The mounted file should point
# database/litellm/sandbox_agent at `*.host.brig` URLs so the cell can
# reach the surrounding services through Warden routing.
#
# Sample aitelier.toml for in-cell use:
#   [database]      url = "postgresql://aitelier:…@postgres.host.brig:5432/aitelier"
#   [litellm]       base_url = "http://litellm.host.brig:4000"
#   [sandbox_agent] mode = "host"  base_url = "http://localhost:2468"
#   [service]       host = "0.0.0.0"  port = 7777
#
# For Docker-mode deployment outside brig, see docker/docker-compose.yml's
# `sa` profile and set `[sandbox_agent] mode = "docker"` in aitelier.toml.

name: aitelier
image: localhost/aitelier:latest
# /app/cell-entrypoint.sh starts SA in the background, waits for it,
# then execs `aitelier serve`. Both processes live inside this cell —
# brig has no inter-cell routing primitive yet (per brig-feedback's
# "longer-term asks"), so co-locating them is the simplest path.
command: ["/app/cell-entrypoint.sh"]
memory: 8g
cpus: 4
pids_limit: 4096
network: default
detach: true
workspace_quota: "20g"

# --- Workspace passthrough ---
# Brig auto-provides /work inside the cell (backed by the cell's
# workspace dir under .brig/state/<cell>/workspace on the host). The
# agent's `aitelier.workspace` requests should reference paths under
# /work. For multi-mount setups consult `brig cell --help` for your
# brig version's volume/mount syntax.

# --- Credentials + config ---
# Register these with `brig secrets add <name>` before running the cell.
# aitelier.toml is the runtime config (TOML, mounted at /app/aitelier.toml).
secrets:
  - aitelier-config            # → /app/aitelier.toml
  - aitelier-secrets-toml      # → /app/aitelier.secrets.toml (api_key, etc)
  - claude-credentials         # → /root/.claude/.credentials.json
  - codex-credentials          # → /root/.codex/auth.json

# Aitelier reads no env vars; this block is intentionally empty.
# Tunables live in aitelier.toml (mounted above), not here.
env: {}

# --- Network policy ---
# Warden enforces this; default deny + explicit allow.
policy:
  allow:
    # LLM providers (uncomment what your routes need).
    - "api.anthropic.com"
    - "api.openai.com"
    # - "generativelanguage.googleapis.com"

    # Sandbox-agent install (one-time on first cell boot — the
    # entrypoint may call `curl install.sh | sh` to fetch SA if the
    # image doesn't bake it in).
    - "releases.rivet.dev"

    # Internal services reached via brig's virtual-domain routing.
    # These are matched as hostnames by Warden — the actual IPs live
    # in brig's routing table.
    - "litellm.host.brig"
    - "postgres.host.brig"

    # MCP servers (allowlist per your consumers' configs).
    # - "*.your-mcp-host.example"

  deny: []

# --- Ingress ---
# aitelier serves on :7777 inside the cell. Expose to other cells via
# `*.host.brig` routing — consumers like hermes hit
# http://aitelier.host.brig from their own cells without needing the
# real port.
ingress:
  - name: api
    port: 7777
    path_prefix: /v1
    auth: token

labels:
  purpose: ai-runtime
  consumers: hermes,dispatcher,deepread
