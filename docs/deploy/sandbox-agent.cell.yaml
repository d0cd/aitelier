# Example brig cell for Rivet's Sandbox Agent (SA).
#
# Architecture:
#   - Only SA runs in this cell. Aitelier itself runs elsewhere (host,
#     docker, k8s, …) and reaches SA-in-cell via brig's ingress reverse
#     proxy on the host: http://127.0.0.1:8443/sandbox-agent/v1/...
#     with `Authorization: Bearer <ingress-token>`.
#   - SA's job is to sandbox agent CLI execution (claude-code, codex,
#     opencode, …). brig is the isolation layer. Putting aitelier in the
#     same cell would conflate aitelier's runtime with the agent
#     execution sandbox — which defeats brig's purpose.
#
# Aitelier configuration (in aitelier.toml on whatever host runs it):
#   [sandbox_agent]
#   base_url = "http://127.0.0.1:8443/sandbox-agent"
#   token    = "<the same bearer token in aitelier.secrets.toml>"
#
# Run with: brig run --file docs/deploy/sandbox-agent.cell.yaml -d
# Attach:   brig cell shell sandbox-agent
# Logs:     brig cell logs sandbox-agent -f
# Network:  brig cell network sandbox-agent

name: sandbox-agent
image: localhost/sandbox-agent-brig:latest
# Entrypoint stages secrets + trusts warden's MITM CA, then execs SA.
command: ["/app/cell-entrypoint.sh"]
# Re-launch this cell on `brig system up` after a VM restart drops every
# container (requires brig with the subnet-reclaim / restart:always change).
# Aitelier is a daily-driver dependency; auto-restore + re-registered
# ingress means `make start` after a reboot just works instead of hitting
# an exited cell. An explicit `brig cell stop` is still respected.
restart: always
memory: 8g
cpus: 4
pids_limit: 4096
network: default
detach: true
workspace_quota: "20g"

# --- Workspace passthrough ---
# Brig auto-provides /work inside the cell (backed by the cell's
# workspace dir under .brig/state/<cell>/workspace on the host).
# Agent file operations (Read/Write/etc.) and `aitelier.workspace`
# requests reference paths under /work.

# --- Credentials ---
# Register with `brig secrets add <name>` before running the cell.
# Aitelier never enters this cell — its config lives wherever aitelier
# itself runs, not here.
#
# Claude auth uses a long-lived OAuth token (`claude setup-token`, ~1yr,
# no rotation), registered once from the Keychain:
#   security find-generic-password -s claude-oauth -w | brig secrets add claude-oauth-token
# The entrypoint exports it as CLAUDE_CODE_OAUTH_TOKEN — no credentials file
# to mount and nothing to re-register as the short-lived access token rotates.
#
# Warden's MITM CA is auto-mounted by brig at /run/brig/ca-bundle.crt
# via `trust_warden_ca: true` (default since brig 0.3.0). All four
# common SSL_CERT_FILE / REQUESTS_CA_BUNDLE / CURL_CA_BUNDLE /
# NODE_EXTRA_CA_CERTS env vars are auto-exported. Do NOT add a
# `warden-ca-cert` secret here — that path was a pre-0.3.0 workaround
# and competing with brig's auto-mount caused CA mismatches when
# warden rotated its cert across brig restarts.
secrets:
  - claude-oauth-token         # → CLAUDE_CODE_OAUTH_TOKEN (long-lived setup-token)
  - codex-credentials          # → $HOME/.codex/auth.json

# Suppress the agent CLIs' phone-home telemetry. claude-code otherwise POSTs
# api.anthropic.com/api/event_logging/v2/batch (rides the inference host, so the
# network allow-list can't separate it from real LLM traffic). These leave
# inference itself untouched.
env:
  DISABLE_TELEMETRY: "1"
  CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC: "1"

# --- Network policy ---
# Warden enforces this; default deny + explicit allow.
policy:
  allow:
    # LLM providers the agent CLIs hit at runtime.
    - "api.anthropic.com"
    # claude-code now hits platform.claude.com for OAuth quota /
    # plan info on every session prompt (added by Anthropic around
    # April 2026 as part of the Agent SDK / extra-usage rollout).
    # Without this, session/prompt 200s the JSON-RPC envelope but
    # the bridge hangs indefinitely waiting on the blocked CONNECT.
    - "platform.claude.com"
    - "api.openai.com"
    # codex CLI auths via ChatGPT subscription OAuth — it hits
    # chatgpt.com for token refresh + session validation before
    # any api.openai.com call. Without this, codex agent runs fail
    # at the first auth step even with `codex-credentials` mounted.
    - "chatgpt.com"
    - "auth.openai.com"
    # - "generativelanguage.googleapis.com"

    # Sandbox-agent installer (one-time on cold cell boot; SA is baked
    # into the image so this is just a safety net).
    - "releases.rivet.dev"

    # Agent CLI distribution mirrors. SA fetches binaries / npm packages
    # on first agent invocation if they're not pre-baked.
    - "storage.googleapis.com"
    - "github.com"
    - "api.github.com"
    - "objects.githubusercontent.com"

    # ACP "agent process" registry (manifest fetched on every
    # initialize to pick which acp-bridge to spawn).
    - "cdn.agentclientprotocol.com"

    # npm registry (fallback if the bridge npm package isn't pre-baked).
    - "registry.npmjs.org"

  deny: []

  # Hosts whose TLS won't survive warden's mitmproxy relay (Cloudflare-
  # fronted strict TLS, HPKP, ECH). Warden tunnels raw TCP after the
  # CONNECT and routes by SNI — per-URL audit is lost for these, but
  # the handshake completes and credentials stay confidential cell↔upstream.
  # Each entry must also be in `allow:` above.
  tls_passthrough:
    # codex CLI's ChatGPT-OAuth flow (Cloudflare fronts both).
    - "chatgpt.com"
    - "auth.openai.com"

# --- Ingress ---
# SA serves ACP on :2468 inside the cell. brig forwards
# http://127.0.0.1:8443/sandbox-agent/v1/... → cell:2468/v1/...
# with bearer-token auth. The bearer secret name is
# `sandbox-agent-ingress-token` (brig's `<cell-name>-ingress-token`
# convention).
ingress:
  - name: acp
    port: 2468
    path_prefix: /v1
    auth: token

labels:
  purpose: agent-sandbox
  consumers: aitelier
