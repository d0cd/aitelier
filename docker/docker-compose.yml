services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aitelier
      POSTGRES_PASSWORD: aitelier_local
      POSTGRES_DB: aitelier
    ports:
      - "5432:5432"
    volumes:
      - aitelier_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitelier -d aitelier"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    env_file: .env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Authorization: Bearer sk-litellm-local", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # sandbox-agent:
  #   image: TBD  # no public image yet
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   env_file: .env
  #   restart: unless-stopped
  #   Uncomment when Sandbox Agent has a published image.

volumes:
  aitelier_pg_data: {}
