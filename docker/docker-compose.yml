services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aitelier
      POSTGRES_PASSWORD: aitelier_local
      POSTGRES_DB: aitelier
    ports:
      - "5432:5432"
    volumes:
      - aitelier_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitelier -d aitelier"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    env_file: .env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "-H", "Authorization: Bearer sk-litellm-local", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  # sandbox-agent:
  #   image: TBD  # no public image yet
  #   ports:
  #     - "8080:8080"
  #   volumes:
  #     - /var/run/docker.sock:/var/run/docker.sock
  #   env_file: .env
  #   restart: unless-stopped
  #   Uncomment when Sandbox Agent has a published image.

  # Containerized Ollama. Off by default — start with:
  #   docker compose --profile ollama up -d
  # or:
  #   make start MODE=ollama
  #
  # macOS users: keep this off. Docker Desktop on Mac has no GPU/Metal
  # passthrough — containerized Ollama is CPU-only and ~10x slower than
  # the host install (`brew install ollama`).
  #
  # Linux + NVIDIA: uncomment the `deploy.resources` block below and have
  # nvidia-container-toolkit installed.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - aitelier_ollama_models:/root/.ollama
    restart: unless-stopped
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  aitelier_pg_data: {}
  aitelier_ollama_models: {}
