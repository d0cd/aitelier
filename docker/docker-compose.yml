services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aitelier
      POSTGRES_PASSWORD: aitelier_local
      POSTGRES_DB: aitelier
    # Host port 5433 (not 5432) so aitelier coexists with other local
    # Postgres instances. Container-internal port is still
    # 5432. Override DATABASE_URL if you change this.
    ports:
      - "5433:5432"
    volumes:
      - aitelier_pg_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aitelier -d aitelier"]
      interval: 5s
      timeout: 3s
      retries: 10

  litellm:
    # Pin to an explicit release tag. `main-latest` lags PyPI by weeks; we
    # need at least v1.84.0 for Ollama's `message.thinking` to round-trip
    # to `message.reasoning_content` in OpenAI shape (older builds dropped
    # it, breaking a consumer's `local`-model smoke). Bump deliberately and
    # re-verify against the live test suite.
    image: ghcr.io/berriai/litellm:v1.84.0
    ports:
      - "4000:4000"
    volumes:
      - ./litellm/config.yaml:/app/config.yaml
    env_file: .env
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    restart: unless-stopped
    # The litellm image has no `curl` on PATH, so use Python (which ships
    # with the image) to probe the no-auth liveness endpoint. /health is a
    # deep check that hits every backend and would flap on upstream 429s.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:4000/health/liveness', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Containerized Sandbox Agent. Off by default — start with:
  #   docker compose --profile sa up -d
  # or set `[sandbox_agent] mode = "docker"` in aitelier.toml so
  # `make start` flips the profile for you (mirrors [ollama] mode).
  #
  # The agent inside SA inherits this container's permissions —
  # filesystem reach is bounded by the `volumes` block below. Credential
  # files (~/.claude, ~/.codex) are mounted read-only so SA can dispatch
  # to claude-code / codex without baking secrets into the image.
  #
  # Workspace: aitelier passes `aitelier.workspace` as the agent's cwd.
  # Mount any host paths the agent should be able to read/write under
  # `/workspaces/<name>` and have callers reference that container path.
  sandbox-agent:
    profiles: ["sa"]
    build:
      context: .
      dockerfile: sandbox-agent.Dockerfile
    ports:
      - "2468:2468"
    volumes:
      - "${HOME}/.claude:/root/.claude:ro"
      - "${HOME}/.codex:/root/.codex:ro"
      - aitelier_sa_workspaces:/workspaces
    restart: unless-stopped
    healthcheck:
      # `curl` is installed in the SA Dockerfile; wget isn't.
      test: ["CMD", "curl", "-sf", "http://localhost:2468/v1/agents"]
      interval: 10s
      timeout: 3s
      retries: 3

  # Containerized Ollama. Off by default — start with:
  #   docker compose --profile ollama up -d
  # or:
  #   make start MODE=ollama
  #
  # macOS users: keep this off. Docker Desktop on Mac has no GPU/Metal
  # passthrough — containerized Ollama is CPU-only and ~10x slower than
  # the host install (`brew install ollama`).
  #
  # Linux + NVIDIA: uncomment the `deploy.resources` block below and have
  # nvidia-container-toolkit installed.
  ollama:
    image: ollama/ollama:latest
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - aitelier_ollama_models:/root/.ollama
    restart: unless-stopped
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

volumes:
  aitelier_pg_data: {}
  aitelier_ollama_models: {}
  aitelier_sa_workspaces: {}
