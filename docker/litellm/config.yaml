model_list:
  - model_name: "local"
    litellm_params:
      model: "ollama/qwen3:8b"
      # OLLAMA_BASE_URL is injected by docker compose: defaults to the host
      # install (host.docker.internal:11434) but switches to the in-compose
      # service (`http://ollama:11434`) when the `ollama` profile is active.
      api_base: "os.environ/OLLAMA_BASE_URL"

  - model_name: "nomic-embed-text"
    litellm_params:
      model: "ollama/nomic-embed-text"
      # OLLAMA_BASE_URL is injected by docker compose: defaults to the host
      # install (host.docker.internal:11434) but switches to the in-compose
      # service (`http://ollama:11434`) when the `ollama` profile is active.
      api_base: "os.environ/OLLAMA_BASE_URL"
      drop_params: true

  - model_name: "claude-sonnet"
    litellm_params:
      model: "anthropic/claude-sonnet-4-6"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  - model_name: "claude-haiku"
    litellm_params:
      model: "anthropic/claude-haiku-4-5-20251001"
      api_key: "os.environ/ANTHROPIC_API_KEY"

  # --- Passthrough wildcards ---
  # Lets consumers request arbitrary model strings (e.g.
  # "anthropic/claude-opus-4-7", "openai/gpt-4o", "ollama/llama3:70b")
  # without adding a named alias here. Each wildcard pulls the right
  # provider creds via the matching env var.
  - model_name: "anthropic/*"
    litellm_params:
      model: "anthropic/*"
      api_key: "os.environ/ANTHROPIC_API_KEY"
  - model_name: "openai/*"
    litellm_params:
      model: "openai/*"
      api_key: "os.environ/OPENAI_API_KEY"
  - model_name: "ollama/*"
    litellm_params:
      model: "ollama/*"
      # OLLAMA_BASE_URL is injected by docker compose: defaults to the host
      # install (host.docker.internal:11434) but switches to the in-compose
      # service (`http://ollama:11434`) when the `ollama` profile is active.
      api_base: "os.environ/OLLAMA_BASE_URL"

general_settings:
  master_key: "os.environ/LITELLM_MASTER_KEY"

litellm_settings:
  # No proxy-side retries. Retries belong in the SDK only — that's the
  # consumer's contract. Silent LiteLLM retries would distort latency, cost,
  # and observability for any SDK call that asked for `max_attempts=1`, and
  # agent calls bypass LiteLLM entirely so the layering would be asymmetric.
  num_retries: 0
  # Cache disabled by default. The proxy has no per-caller scoping today, so
  # in a multi-tenant deployment a consumer could extract another consumer's
  # cached completion by replaying the same prompt. If you re-enable for a
  # single-tenant install, set `cache_params.namespace` to a per-instance
  # value so cache keys don't collide across deployments.
  cache: false
